services:
  unraid-mcp:
    build: .
    image: unraid-code-mode-mcp:latest
    container_name: unraid-code-mode-mcp
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: '8000'
      # In multi-tenant deployments, leave the credential vars unset and let
      # the MCP client send them as X-Unraid-* headers per request.
      UNRAID_BASE_URL: ${UNRAID_BASE_URL:-}
      UNRAID_API_KEY: ${UNRAID_API_KEY:-}
      UNRAID_INSECURE: ${UNRAID_INSECURE:-false}
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
