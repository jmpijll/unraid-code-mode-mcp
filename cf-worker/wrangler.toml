name = "unraid-code-mode-mcp"
main = "index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Worker Loader binding for the @cloudflare/codemode DynamicWorkerExecutor
# sandbox. Requires the worker_loaders compatibility flag rollout — see
# https://developers.cloudflare.com/workers/runtime-apis/bindings/worker-loader/.
worker_loaders = [
  { binding = "LOADER" }
]

# Defaults — leave unset for multi-tenant. Set them as Worker secrets for
# single-tenant deployments:
#   wrangler secret put DEFAULT_API_KEY
[vars]
NAMESPACE = "local"
# DEFAULT_BASE_URL = "https://tower.local"
